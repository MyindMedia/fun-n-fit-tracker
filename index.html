
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#0B0E13" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Fun N' Fit Tracker</title>
    <!-- Social share (Open Graph / Twitter). URLs must be absolute; switch to
         funnfitacademy.com when the custom domain is pointed at the app. -->
    <meta property="og:title" content="Fun 'n Fit Academy — Where Fitness Meets Fun and Leadership" />
    <meta property="og:description" content="Games, houses, and live leaderboards for kids 6–17 in Upland, CA. Empower through play." />
    <meta property="og:image" content="https://fnffinal.netlify.app/assets/theme/og-share.png" />
    <meta property="og:url" content="https://fnffinal.netlify.app/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://fnffinal.netlify.app/assets/theme/og-share.png" />
    <link rel="icon" type="image/png" href="/fnfa-logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/fnfa-logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lexend+Deca:wght@300;400;500;600;700;800;900&family=Days+One&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(255, 255, 255, 0.2);

        /* Z-index system for consistent layering */
        --z-base: 1;
        --z-header: 20;
        --z-action-bar: 30;
        --z-dropdown: 40;
        --z-sticky: 50;
        --z-modal-backdrop: 100;
        --z-modal: 200;
        --z-toast: 300;
        --z-tooltip: 400;
        --z-max: 9999;

        /* Spacing for mobile-first design */
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --action-bar-height: 64px;
        --header-height: 56px;

        /* Touch target sizes */
        --touch-target-min: 44px;
        --touch-target-comfortable: 48px;
      }
      body {
        font-family: 'Chakra Petch', 'Inter', sans-serif;
        background-color: #0B0E13;
        color: #e5e7eb;
      }
      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Lexend Deca', sans-serif;
        letter-spacing: -0.02em;
      }
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a3140;
        border-radius: 20px;
        border: 3px solid #0B0E13;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3d4658;
      }

      @keyframes spotlight {
        0% { transform: scale(0.8) translateY(20px); opacity: 0; filter: blur(10px); }
        100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
      }

      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        33% { transform: translateY(-15px) rotate(1deg); }
        66% { transform: translateY(-5px) rotate(-1deg); }
      }

      @keyframes card-reveal {
        0% { transform: perspective(1000px) rotateY(-15deg) scale(0.9); opacity: 0; }
        100% { transform: perspective(1000px) rotateY(0deg) scale(1); opacity: 1; }
      }

      .animate-spotlight {
        animation: spotlight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .animate-float {
        animation: float-slow 6s ease-in-out infinite;
      }

      /* ── Pubzi esports theme layer (opt-in via .pz-* classes) ──────────────
         Ported from the Pubzi template: near-black bg, volt accent, Days One
         display + Chakra Petch body, notched cut-corner panels. Redesigned
         surfaces (live board, parent portal, site chrome) use these; admin
         and student portal keep the light theme. */
      :root {
        --pz-bg: #0B0E13;
        --pz-panel: #12161F;
        --pz-panel-2: #171C27;
        --pz-volt: #CBFE1C;
        --pz-text: #ABABAB;
        --pz-white: #ffffff;
        --pz-border: rgba(255, 255, 255, 0.08);
        --pz-unity: #0ea5e9;
        --pz-sage: #10b981;
        --pz-spark: #f97316;
        --pz-valor: #8b5cf6;
        /* Notched corner cuts (the template's signature panel shape) */
        --pz-notch: 14px;
        --pz-notch-sm: 8px;
      }
      .pz-display {
        font-family: 'Days One', 'Lexend Deca', sans-serif;
        letter-spacing: 0.01em;
        text-transform: uppercase;
      }
      .pz-body, .pz-scope {
        font-family: 'Chakra Petch', 'Inter', sans-serif;
        letter-spacing: 0;
      }
      .pz-scope h1, .pz-scope h2, .pz-scope h3, .pz-scope h4 {
        font-family: 'Days One', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.01em;
      }
      /* Notched panel — top-left + bottom-right corners cut on the diagonal */
      .pz-card {
        background: var(--pz-panel);
        border: 1px solid var(--pz-border);
        clip-path: polygon(
          var(--pz-notch) 0, 100% 0, 100% calc(100% - var(--pz-notch)),
          calc(100% - var(--pz-notch)) 100%, 0 100%, 0 var(--pz-notch)
        );
      }
      .pz-card-sm {
        background: var(--pz-panel);
        border: 1px solid var(--pz-border);
        clip-path: polygon(
          var(--pz-notch-sm) 0, 100% 0, 100% calc(100% - var(--pz-notch-sm)),
          calc(100% - var(--pz-notch-sm)) 100%, 0 100%, 0 var(--pz-notch-sm)
        );
      }
      /* Volt call-to-action with a cut corner; dark text like the template */
      .pz-btn {
        font-family: 'Chakra Petch', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #0B0E13;
        background: var(--pz-volt);
        clip-path: polygon(var(--pz-notch-sm) 0, 100% 0, 100% calc(100% - var(--pz-notch-sm)), calc(100% - var(--pz-notch-sm)) 100%, 0 100%, 0 var(--pz-notch-sm));
        transition: filter 0.15s ease, transform 0.1s ease;
      }
      .pz-btn:hover { filter: brightness(1.08); }
      .pz-btn:active { transform: translateY(1px); }
      .pz-btn-ghost {
        font-family: 'Chakra Petch', sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--pz-white);
        background: transparent;
        border: 1px solid var(--pz-border);
        clip-path: polygon(var(--pz-notch-sm) 0, 100% 0, 100% calc(100% - var(--pz-notch-sm)), calc(100% - var(--pz-notch-sm)) 100%, 0 100%, 0 var(--pz-notch-sm));
        transition: border-color 0.15s ease, color 0.15s ease;
      }
      .pz-btn-ghost:hover { border-color: var(--pz-volt); color: var(--pz-volt); }
      /* Eyebrow label: volt tick + spaced uppercase, like the template's section tags */
      .pz-eyebrow {
        font-family: 'Chakra Petch', sans-serif;
        font-weight: 600;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        color: var(--pz-volt);
      }
      .pz-eyebrow::before { content: "// "; opacity: 0.7; }
      /* Ambient board background: arena art + gradient falloff */
      .pz-arena {
        background-color: var(--pz-bg);
        background-image:
          linear-gradient(to bottom, rgba(11, 14, 19, 0.55), rgba(11, 14, 19, 0.92) 70%, #0B0E13),
          url('/assets/theme/arena-bg.png');
        background-size: cover;
        background-position: center top;
      }
      .pz-banner {
        background-color: var(--pz-bg);
        background-image:
          linear-gradient(to bottom, rgba(11, 14, 19, 0.35), rgba(11, 14, 19, 0.9)),
          url('/assets/theme/portal-banner.png');
        background-size: cover;
        background-position: center;
      }
      /* Volt pulse for LIVE indicators and score changes */
      @keyframes pz-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(203, 254, 28, 0.5); }
        50% { box-shadow: 0 0 0 6px rgba(203, 254, 28, 0); }
      }
      .pz-live { animation: pz-pulse 2s ease-in-out infinite; }
      @keyframes pz-scan {
        from { background-position: 0 0; }
        to { background-position: 0 8px; }
      }
      /* ── Scroll reveal + parallax (landing & live board) ──────────────────
         Elements start hidden with .pz-reveal (optionally .pz-reveal-left/right
         for directional slides); an IntersectionObserver adds .pz-in to play.
         Stagger children with --pz-delay. Parallax layers move via a CSS var
         set from scroll position (translate3d for compositing). */
      .pz-reveal {
        opacity: 0;
        transform: translateY(28px);
        transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                    transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        transition-delay: var(--pz-delay, 0ms);
        will-change: opacity, transform;
      }
      .pz-reveal-left { transform: translateX(-36px); }
      .pz-reveal-right { transform: translateX(36px); }
      .pz-reveal-scale { transform: scale(0.94) translateY(16px); }
      .pz-reveal.pz-in {
        opacity: 1;
        transform: none;
      }
      .pz-parallax {
        transform: translate3d(0, calc(var(--pz-scroll, 0) * var(--pz-speed, -0.15) * 1px), 0);
        will-change: transform;
      }
      @keyframes pz-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .pz-float { animation: pz-float 7s ease-in-out infinite; }
      .pz-float-slow { animation: pz-float 11s ease-in-out infinite; }
      @keyframes pz-drift {
        0%, 100% { background-position: center top; }
        50% { background-position: center 12%; }
      }
      @media (prefers-reduced-motion: reduce) {
        .pz-live, .pz-float, .pz-float-slow { animation: none; }
        .pz-reveal { opacity: 1; transform: none; transition: none; }
        .pz-parallax { transform: none; }
      }

      .animate-card-reveal {
        animation: card-reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .gold-glow {
        box-shadow: 0 0 50px rgba(251, 191, 36, 0.25), inset 0 0 20px rgba(251, 191, 36, 0.1);
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }
      * { -webkit-tap-highlight-color: transparent; }

      /* Fallback for devices without backdrop-filter support */
      @supports not ((backdrop-filter: blur(12px))) {
        .glass {
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
        }
        .bg-black\/80, .bg-white\/95, .bg-slate-900\/90 {
          background-color: rgba(0,0,0,0.8) !important;
        }
      }

      /* Toast notification animations */
      @keyframes slide-in-right {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slide-out-right {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }

      .animate-slide-in-right {
        animation: slide-in-right 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .animate-slide-out-right {
        animation: slide-out-right 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Infinite ticker animation */
      @keyframes ticker-infinite {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      .animate-ticker-infinite {
        animation: ticker-infinite 480s linear infinite;
      }

      /* Flashing green border for key updates */
      @keyframes flash-border {
        0%, 100% {
          opacity: 1;
          box-shadow: 0 0 10px rgba(16, 185, 129, 0.8);
        }
        50% {
          opacity: 0.3;
          box-shadow: 0 0 20px rgba(16, 185, 129, 1);
        }
      }

      .animate-flash-border {
        animation: flash-border 1.5s ease-in-out infinite;
      }

      /* Confetti falling animation */
      @keyframes confetti-fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0.3;
        }
      }

      .animate-confetti-fall {
        animation: confetti-fall linear forwards;
        will-change: transform, opacity;
      }

      /* Point bubble animations */

      /* GREEN - Points Added: Pop in, then float UP off screen */
      @keyframes points-float-up {
        0% {
          transform: scale(0.3) translateY(50px);
          opacity: 0;
        }
        12% {
          transform: scale(1.15) translateY(0);
          opacity: 1;
        }
        20% {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
        80% {
          opacity: 0.8;
        }
        100% {
          transform: scale(0.9) translateY(-60vh);
          opacity: 0;
        }
      }

      .animate-points-float-up {
        animation: points-float-up 2.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        will-change: transform, opacity;
      }

      /* RED - Points Deducted: Pop in, shake/break, then fall DOWN off screen */
      @keyframes points-break-fall {
        0% {
          transform: scale(0.3) translateY(-30px) rotate(0deg);
          opacity: 0;
        }
        8% {
          transform: scale(1.2) translateY(0) rotate(0deg);
          opacity: 1;
        }
        12% {
          transform: scale(1) translateY(0) rotate(0deg);
          opacity: 1;
        }
        /* Shake/vibrate phase */
        16% {
          transform: scale(1) translateY(0) rotate(-4deg);
        }
        20% {
          transform: scale(1) translateY(0) rotate(4deg);
        }
        24% {
          transform: scale(1) translateY(0) rotate(-3deg);
        }
        28% {
          transform: scale(1.05) translateY(0) rotate(3deg);
        }
        32% {
          transform: scale(1) translateY(0) rotate(0deg);
          opacity: 1;
        }
        /* Break apart and fall off screen */
        50% {
          transform: scale(1.1) translateY(10px) rotate(-8deg);
          opacity: 0.9;
        }
        100% {
          transform: scale(0.5) translateY(60vh) rotate(35deg);
          opacity: 0;
        }
      }

      .animate-points-break-fall {
        animation: points-break-fall 2.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        will-change: transform, opacity;
      }

      /* Sparkle effect for points added */
      @keyframes sparkle-burst {
        0% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.8), 0 0 0 0 rgba(52, 211, 153, 0.6);
        }
        50% {
          box-shadow: 0 0 20px 10px rgba(16, 185, 129, 0.4), 0 0 40px 20px rgba(52, 211, 153, 0.2);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0), 0 0 0 0 rgba(52, 211, 153, 0);
        }
      }

      .animate-sparkle-burst {
        animation: sparkle-burst 0.6s ease-out forwards;
      }

      /* Crack effect overlay for deducted points */
      @keyframes crack-effect {
        0% {
          clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }
        40% {
          clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }
        60% {
          clip-path: polygon(0 0, 48% 0, 50% 50%, 48% 100%, 0 100%);
        }
        100% {
          clip-path: polygon(0 0, 45% 0, 50% 40%, 55% 100%, 0 100%);
        }
      }

      /* Red glow pulse for deducted points */
      @keyframes red-pulse {
        0%, 100% {
          box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
        50% {
          box-shadow: 0 0 25px rgba(239, 68, 68, 0.8), 0 0 50px rgba(239, 68, 68, 0.4);
        }
      }

      .animate-red-pulse {
        animation: red-pulse 0.3s ease-in-out 2;
      }

      /* Print / PDF Styles */
      @media print {
        body {
          background: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Hide navigation, overlays, and interactive elements */
        nav,
        .print\\:hidden,
        button:not(.print-visible),
        select,
        input,
        .animate-points-float-up,
        .animate-points-break-fall {
          display: none !important;
        }

        /* Full-width layout */
        .print\\:relative {
          position: relative !important;
        }
        .print\\:bg-white {
          background: white !important;
        }
        .print\\:backdrop-blur-none {
          backdrop-filter: none !important;
        }
        .print\\:shadow-none {
          box-shadow: none !important;
        }
        .print\\:rounded-none {
          border-radius: 0 !important;
        }
        .print\\:py-0 {
          padding-top: 0 !important;
          padding-bottom: 0 !important;
        }
        .print\\:px-0 {
          padding-left: 0 !important;
          padding-right: 0 !important;
        }
        .print\\:p-6 {
          padding: 1.5rem !important;
        }
        .print\\:text-3xl {
          font-size: 1.875rem !important;
          line-height: 2.25rem !important;
        }
        .print\\:grid-cols-3 {
          grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
        }

        /* Ensure backgrounds print */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Page breaks */
        .page-break-before {
          page-break-before: always;
        }
        .page-break-after {
          page-break-after: always;
        }
        .avoid-break {
          page-break-inside: avoid;
        }

        /* Gradient header fallback for print */
        .print\\:bg-brand-blue {
          background: #0ea5e9 !important;
        }

        /* Scale down for print */
        .max-w-6xl {
          max-width: 100% !important;
        }

        /* Table styling for print */
        table {
          border-collapse: collapse;
        }
        th, td {
          border: 1px solid #e2e8f0;
        }
      }

      /* Print page settings */
      @page {
        size: A4;
        margin: 0.5in;
      }

      /* Fade-in animation for modals */
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .animate-fade-in {
        animation: fade-in 0.2s ease-out forwards;
      }

      /* Safe area insets for iOS */
      .safe-area-inset-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      .safe-area-inset-top {
        padding-top: env(safe-area-inset-top, 0px);
      }

      /* No scrollbar utility */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Mobile touch improvements */
      @media (hover: none) and (pointer: coarse) {
        button, a, [role="button"] {
          -webkit-tap-highlight-color: transparent;
          touch-action: manipulation;
        }
      }

      /* Prevent pull-to-refresh on mobile */
      html, body {
        overscroll-behavior-y: contain;
      }

      /* Prevent auto-zoom on input focus in iOS/Android */
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }

      /* Chrome Android-specific fixes */
      @supports (-webkit-touch-callout: none) or (touch-action: manipulation) {
        .touch-none {
          touch-action: none;
        }
        .touch-pan-y {
          touch-action: pan-y;
        }
      }

      /* Smooth scrolling for mobile */
      .smooth-scroll {
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }

      /* Ensure modals are properly layered on Android Chrome */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: var(--z-modal);
        touch-action: none;
      }
      .modal-content {
        touch-action: pan-y;
      }

      /* ========== MOBILE-FIRST LAYOUT UTILITIES ========== */

      /* Full-screen mobile modal with proper spacing */
      .mobile-modal {
        position: fixed;
        inset: 0;
        z-index: var(--z-modal);
        display: flex;
        flex-direction: column;
        background: #0B0E13;
      }

      .mobile-modal-header {
        position: sticky;
        top: 0;
        z-index: var(--z-sticky);
        background: #12161F;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: var(--header-height);
        flex-shrink: 0;
      }

      .mobile-modal-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding: 1rem;
        padding-bottom: calc(1rem + var(--safe-area-bottom));
      }

      /* Bottom action bar that respects safe areas */
      .mobile-action-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: var(--z-action-bar);
        background: #12161F;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: var(--safe-area-bottom);
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.35);
      }

      /* Content area that accounts for fixed action bar */
      .mobile-content-with-bar {
        padding-bottom: calc(var(--action-bar-height) + var(--safe-area-bottom) + 1rem);
      }

      /* Touch-friendly button base */
      .touch-btn {
        min-height: var(--touch-target-min);
        min-width: var(--touch-target-min);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
      }

      /* Card grid that adapts to mobile */
      .mobile-card-grid {
        display: grid;
